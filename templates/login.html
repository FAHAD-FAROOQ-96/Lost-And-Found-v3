{% extends "base.html" %}
{% block title %}Log In — Lost & Found{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-wrap">

        <div class="auth-left">
            <h2 class="auth-big">
                Never<br>
                <span class="accent">Lose</span><br>
                Track<br>
                Again
            </h2>
            <p class="auth-sub">FAST NUCES Islamabad<br>Campus Item Recovery System</p>
        </div>

        <div class="auth-right">
            <div class="auth-card">

                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-hint">Log in with your FAST university account</p>

                <form method="POST" action="{{ url_for('login') }}">

                    <div class="field">
                        <label for="email">University Email</label>
                        <input type="email" id="email" name="email" placeholder="i24XXXX@isb.nu.edu.pk" required>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Your password" required>
                    </div>

                    <button
                        type="submit"
                        class="btn-submit"
                        id="loginSubmitBtn"
                        data-lockout-seconds="{{ lockout_remaining|default(0) }}"
                    >
                        Log In →
                    </button>
                    <small id="loginLockoutHint" style="display:none;"></small>

                </form>

                <p class="switch-link">
                    Don't have an account?
                    <a href="{{ url_for('signup') }}">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</section>
<script>
(function () {
    var loginBtn = document.getElementById("loginSubmitBtn");
    var lockoutHint = document.getElementById("loginLockoutHint");
    if (!loginBtn || !lockoutHint) return;

    var remaining = parseInt(loginBtn.dataset.lockoutSeconds || "0", 10);
    if (!remaining || remaining <= 0) return;

    function formatRemaining(totalSeconds) {
        var mins = Math.floor(totalSeconds / 60);
        var secs = totalSeconds % 60;
        return mins + ":" + String(secs).padStart(2, "0");
    }

    function applyLockoutState() {
        loginBtn.disabled = true;
        loginBtn.textContent = "Try again in " + formatRemaining(remaining);
        lockoutHint.style.display = "block";
        lockoutHint.textContent = "Too many failed attempts. Login is locked for " + formatRemaining(remaining) + ".";
    }

    applyLockoutState();
    var timer = setInterval(function () {
        remaining -= 1;
        if (remaining <= 0) {
            clearInterval(timer);
            loginBtn.disabled = false;
            loginBtn.textContent = "Log In →";
            lockoutHint.style.display = "none";
            return;
        }
        applyLockoutState();
    }, 1000);
})();
</script>
{% endblock %}
